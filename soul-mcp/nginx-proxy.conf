# soul-mcp – OpenResty Proxy-Konfiguration
# Einfügen in den server{}-Block von /etc/openresty/sites-available/YOUR_DOMAIN
# NACH den bestehenden /api/-Locations

    # MCP Server – Streamable HTTP
    location /mcp {
        proxy_pass         http://127.0.0.1:3098/mcp;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # OAuth 2.0 Flow
    location /oauth/ {
        proxy_pass         http://127.0.0.1:3098/oauth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OAuth Discovery (RFC 8414)
    location /.well-known/oauth-authorization-server {
        proxy_pass         http://127.0.0.1:3098/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health Check
    location /mcp-health {
        proxy_pass         http://127.0.0.1:3098/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
