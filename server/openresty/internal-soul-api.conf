# /etc/openresty/sites-available/internal-soul-api
# Interner HTTP-Listener für soul-mcp → kein TLS, nur 127.0.0.1
# Zweck: soul-mcp API-Calls ohne TLS-Overhead (GET /api/soul + PUT /api/context)

server {
  listen 127.0.0.1:8081;
  server_name localhost;

  default_type application/json;
  add_header Cache-Control "no-store" always;

  # Kein externer Zugriff — nginx blockiert automatisch da nur 127.0.0.1

  location = /api/validate {
    access_by_lua_file /etc/openresty/lua/soul_auth.lua;
    return 200 '{"ok":true}';
  }

  location = /api/soul {
    access_by_lua_file /etc/openresty/lua/vault_auth.lua;
    default_type text/plain;
    content_by_lua_file /etc/openresty/lua/api_serve.lua;
  }

  location = /api/context {
    client_max_body_size 4M;
    client_body_buffer_size 4M;
    access_by_lua_file /etc/openresty/lua/vault_auth.lua;
    content_by_lua_file /etc/openresty/lua/api_context.lua;
  }

  location / {
    return 404 '{"error":"not_found"}';
  }
}
