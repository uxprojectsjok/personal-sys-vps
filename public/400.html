<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>400 – SaveYourSoul</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    @font-face { font-family:"Inter"; src:url("/fonts/inter/Inter_18pt-Regular.woff2") format("woff2"); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:"Inter"; src:url("/fonts/inter/Inter_18pt-Medium.woff2")  format("woff2"); font-weight:500; font-style:normal; font-display:swap; }
    @font-face { font-family:"Inter"; src:url("/fonts/inter/Inter_18pt-Bold.woff2")    format("woff2"); font-weight:700; font-style:normal; font-display:swap; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { color-scheme:dark; }
    body { background:#050510; color:#eef2ff; font-family:"Inter",system-ui,sans-serif; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px; -webkit-font-smoothing:antialiased; }
    .wrap { text-align:center; max-width:460px; }
    .code { font-size:5.5rem; font-weight:700; letter-spacing:-0.04em; line-height:1; background:linear-gradient(135deg,#22d3ee,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:1.25rem; }
    .title { font-size:1.25rem; font-weight:600; color:#eef2ff; margin-bottom:0.5rem; }
    .hint  { font-size:0.875rem; color:rgba(238,242,255,0.42); margin-bottom:2rem; line-height:1.6; }
    .btn   { display:inline-flex; align-items:center; gap:0.4rem; padding:0.75rem 1.5rem; border-radius:0.75rem; background:linear-gradient(135deg,#22d3ee,#a78bfa); color:#000; font-weight:700; font-size:0.875rem; text-decoration:none; transition:opacity 0.15s; }
    .btn:hover { opacity:0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">400</div>
    <p class="title">Ungültige Anfrage</p>
    <p class="hint">Die gesendete Anfrage konnte vom Server nicht verarbeitet werden.<br>Bitte überprüfe die URL und versuche es erneut.</p>
    <a href="/" class="btn">Zur Startseite</a>
  </div>
</body>
</html>
